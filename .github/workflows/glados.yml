name: GLaDOS Auto Checkin

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions 的 schedule 使用 UTC。公共 runner 可能严重延迟甚至丢弃单次 cron，
    # 所以在北京时间中午到傍晚之间多次兜底触发；当天已签到会被脚本识别为成功。
    - cron: '17 4 * * *'
    - cron: '47 4 * * *'
    - cron: '17 5 * * *'
    - cron: '47 5 * * *'
    - cron: '17 6 * * *'
    - cron: '47 6 * * *'
    - cron: '17 7 * * *'
    - cron: '47 7 * * *'
    - cron: '17 8 * * *'
    - cron: '47 8 * * *'

concurrency:
  group: glados-checkin-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run checkin
        run: python checkin.py
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          COOKIES: ${{ secrets.COOKIES }}
